<!DOCTYPE html>
<html lang="si" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Study Portal - Geography, Media, Sinhala</title>
    <meta name="description" content="A personal portal for A/L students to organize and watch class recordings.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <!-- Auth Background & Overlay -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-background">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="auth-box glass-panel">
            <div class="auth-header">
                <div class="logo-wrapper">
                    <i class='bx bxs-graduation'></i>
                </div>
                <h2>A/L Portal</h2>
            </div>
            
            <h3 id="authTitle" class="auth-subtitle">ඇතුල් වන්න (Login)</h3>
            <p id="authDesc" class="auth-desc">කරුණාකර ඔබගේ විස්තර ලබා දෙන්න.</p>
            
            <!-- Step 1: Login -->
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="username"><i class='bx bx-user'></i> පරිශීලක නාමය (Username)</label>
                    <input type="text" id="username" placeholder="ඔබගේ නම..." required>
                </div>
                <div class="input-group">
                    <label for="password"><i class='bx bx-lock-alt'></i> මුරපදය (Password)</label>
                    <input type="password" id="password" placeholder="මුරපදය..." required>
                </div>
                <button type="submit" class="submit-btn primary-btn">
                    ඉදිරියට (Next) <i class='bx bx-right-arrow-alt'></i>
                </button>
            </form>

            <!-- Step 2: Phone Verification -->
            <form id="verifyForm" class="auth-form hidden">
                <div class="input-group">
                    <label for="phone"><i class='bx bx-phone'></i> දුරකථන අංකය (Phone Number)</label>
                    <input type="tel" id="phone" placeholder="07XXXXXXXX" pattern="[0-9]{10}" required>
                    <small style="color:var(--text-secondary); font-size:0.8rem; margin-top:0.3rem">ඉලක්කම් 10කින් යුත් නිවැරදි අංකය ලබාදෙන්න.</small>
                </div>
                <button type="submit" class="submit-btn success-btn">
                    තහවුරු කරන්න (Verify) <i class='bx bx-check-circle'></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content App -->
    <div class="app-container" id="appContainer" style="display: none;">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <i class='bx bxs-graduation'></i>
                </div>
                <h2>A/L Portal</h2>
            </div>
            <ul class="nav-links">
                <li class="active" data-subject="all">
                    <i class='bx bx-grid-alt'></i>
                    <span>සියලුම (All)</span>
                </li>
                <li data-subject="geography">
                    <i class='bx bx-globe'></i>
                    <span>භූගෝල විද්‍යාව</span>
                </li>
                <li data-subject="media">
                    <i class='bx bx-video'></i>
                    <span>සන්නිවේදනය</span>
                </li>
                <li data-subject="sinhala">
                    <i class='bx bx-book-content'></i>
                    <span>සිංහල (Sinhala)</span>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button id="themeToggleBtn" class="theme-toggle" title="තේමාව වෙනස් කරන්න">
                    <i class='bx bx-sun'></i>
                    <span>තේමාව (Theme)</span>
                </button>
                <button id="logoutBtn" class="logout-btn" title="ඉවත් වන්න (Logout)">
                    <i class='bx bx-log-out'></i>
                    <span>ඉවත් වන්න (Logout)</span>
                </button>
            </div>
        </nav>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles">
                    <h1 id="page-title">සියලුම පාඩම් <span class="badge">All</span></h1>
                    <p class="subtitle">ඔබගේ පන්ති වල වීඩියෝ පහසුවෙන් නරඹන්න</p>
                </div>
                <button class="add-btn primary-btn glass-panel" id="openModalBtn">
                    <i class='bx bx-plus'></i>
                    <span>නව වීඩියෝවක් එක් කරන්න</span>
                </button>
            </header>

            <section class="video-grid" id="videoGrid">
                <!-- Videos will be rendered here dynamically -->
            </section>
        </main>
    </div>

    <!-- Add Video Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>නව වීඩියෝවක් එක් කරන්න</h2>
                <button class="close-btn" id="closeModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <form id="addVideoForm">
                <div class="input-group">
                    <label for="videoSubject"><i class='bx bx-book'></i> විෂය (Subject)</label>
                    <div class="select-wrapper">
                        <select id="videoSubject" required>
                            <option value="" disabled selected>විෂය තෝරන්න...</option>
                            <option value="geography">භූගෝල විද්‍යාව (Geography)</option>
                            <option value="media">සන්නිවේදනය හා මාධ්‍ය අධ්‍යයනය (Media)</option>
                            <option value="sinhala">සිංහල (Sinhala)</option>
                        </select>
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
                <div class="input-group" style="margin-top: 1rem">
                    <label for="videoTitle"><i class='bx bx-text'></i> මාතෘකාව (Title)</label>
                    <input type="text" id="videoTitle" placeholder="උදා: භූගෝල විද්‍යාව 1 වන පාඩම" required>
                </div>
                <div class="input-group" style="margin-top: 1rem">
                    <label for="videoUrl"><i class='bx bx-link-alt'></i> YouTube ලින්ක් එක (URL)</label>
                    <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>
                <button type="submit" class="submit-btn primary-btn" id="submitVideoBtn" style="margin-top: 1.5rem">
                    එක් කරන්න (Add) <i class='bx bx-cloud-upload'></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal-content player-content glass-panel">
            <div class="modal-header">
                <h2 id="playerTitle">Video Title</h2>
                <button class="close-btn" id="closePlayerBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="video-wrapper">
                <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
